name: record_screen
goal: 录制屏幕操作过程为 mp4 视频文件，支持后台录制（不阻塞其他任务）
inputs:
  action: |
    操作类型，必填：
    - "start": 开始录制（后台运行，立即返回）
    - "stop": 停止录制并输出文件路径
    - "status": 查询当前录制状态
  output_path: |
    （仅 start 时有效）输出文件路径，默认为 ~/.monad/output/recording_<timestamp>.mp4
steps:
  - 调用 start 时：用 subprocess 后台启动 ffmpeg 录制屏幕，将 pid 和输出路径保存到 ~/.monad/cache/record_screen.json，立即返回"录制已开始"
  - 调用 stop 时：读取 cache 中的 pid，发送 SIGTERM 终止 ffmpeg，等待进程结束，返回输出文件路径
  - 调用 status 时：检查 pid 是否存活，返回录制状态和已录制时长
triggers:
  - 用户说"开始录屏"、"帮我录制屏幕"
  - 用户说"停止录屏"、"结束录制"
  - 需要录制演示视频、操作过程
  - 用户说"record screen"、"start recording"
