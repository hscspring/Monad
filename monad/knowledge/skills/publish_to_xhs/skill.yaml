name: publish_to_xhs
goal: 将文章/笔记发布到小红书平台（图文笔记），支持自动生成知识图谱配图
inputs:
- title (标题，10字左右，最多不超过12字，超长会被截断)
- content (正文内容)
- topics (话题标签列表，如 ["AI", "技术分享"])
- images (图片路径列表，可选)
- knowledge_map (是否自动生成知识图谱配图，默认 True)
- source_url (原文链接，会追加到正文末尾)
steps:
- 用 LLM 将原始内容改写为小红书风格正文（口语化、去术语、200-400字）
- 若无图片，走"文字配图"模式：用 LLM 将改写后的正文精炼为 3-5 句吸引人的文字卡片文案
- 若有图片，直接上传图片
- 若开启 knowledge_map，调用 doc2mermaid 生成知识图谱 PNG 并作为额外图片上传
- 填写标题（智能截断到约 12 字，避免英文单词被切半，超长时加 "…"）
- 在正文编辑器中通过 #关键词 添加话题标签
- 点击发布
outputs:
  result: 发布结果（成功/失败及笔记链接）
notes:
- 传入的 content 可以是技术文章/博客原文，skill 内部会自动用 LLM 改写为小红书风格
- 文字卡片不宜过长，LLM 会自动把正文提炼为 3-5 句精华（每句 ≤15 字）
- 首次使用需运行 login() 登录，使用持久化浏览器 profile 保存登录态
- 知识图谱需要 doc2mermaid 包和 mmdc (Node ≥18)
triggers:
- 用户要求把文章或 blog 发到小红书
- 用户要求发布小红书笔记
- 发布内容到小红书
- 帮我发小红书
dependencies:
  python:
    - doc2mermaid
    - playwright
  system:
    - mmdc  # npm install -g @mermaid-js/mermaid-cli
